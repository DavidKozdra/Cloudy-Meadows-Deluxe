name = "cloudy-meadows"
compatibility_date = "2024-11-01"

# This is a static, client-side game (p5.js, no build step). Cloudflare Pages
# serves the contents of the directory below directly. There is nothing to
# compile or bundle, so the build command in the dashboard should be left empty
# (or set to `exit 0`) and the framework preset to "None".
pages_build_output_dir = "farm_game/public"

[[durable_objects.bindings]]
name = "AUTO_FARM_WORLD"
class_name = "AutoFarmWorld"
script_name = "cloudy-meadows-autofarm-world"
