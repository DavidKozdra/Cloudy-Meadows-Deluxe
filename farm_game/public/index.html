<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cloudy Meadows">
    <meta name="application-name" content="Cloudy Meadows">
    <meta name="theme-color" content="#7ec0ee">
    <meta name="description" content="An urban vertical farming community game. Farm with composting and helpful animals, meet interesting people, and save the meadows in 100 days.">
    <title>Cloudy Meadows: Deluxe Edition</title>

    <!-- PWA: installable, offline-capable -->
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="images/pwa/apple-touch-icon.png">
    <script type="text/javascript" src="pwa-register.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/p5@1.4.1/lib/p5.min.js"></script>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/p5@1.4.1/lib/addons/p5.sound.min.js"></script>

    <link rel="icon" type="image/png" sizes="32x32" href="images/pwa/favicon-32.png">
    <link rel="icon" type="image/png" sizes="512x512" href="images/pwa/icon-512.png">
    <script type="text/javascript" src="localDataStorage-3.0.0.min.js"></script>
    
    <!-- Class definitions (must load before usage in preload.js) -->
    <script src="classes/Sound.js"></script>
    <script src="classes/Cloud.js"></script>
    <script src="classes/item.js?v=11"></script>
    <script src="classes/level.js?v=10"></script>
    <script src="classes/quest.js?v=8"></script>
    <script src="classes/dialouge.js?v=8"></script>
    <script src="classes/tile_classes/tile.js?v=8"></script>
    <script src="classes/tile_classes/plant.js?v=8"></script>
    <script src="classes/tile_classes/entity.js?v=8"></script>
    <script src="classes/tile_classes/moveable-entity.js?v=8"></script>
    <script src="classes/tile_classes/player.js?v=11"></script>
    <script src="classes/tile_classes/grid-move-entity.js?v=8"></script>
    <script src="classes/tile_classes/free-move-entity.js?v=8"></script>
    <script src="classes/tile_classes/light-move-entity.js?v=8"></script>
    <script src="classes/tile_classes/pay-to-move-entity.js?v=8"></script>
    <script src="classes/tile_classes/npc.js?v=8"></script>
    <script src="classes/tile_classes/shop.js?v=9"></script>
    <script src="classes/tile_classes/chest.js?v=8"></script>
    <script src="classes/tile_classes/robot.js?v=8"></script>
    <script src="classes/tile_classes/farm-robot.js?v=8"></script>
    <script src="classes/tile_classes/air_ballon.js?v=8"></script>
    <script src="classes/cooperative-exchange.js?v=8"></script>
    <script src="classes/time-rewind.js?v=1"></script>

    <!-- Configuration files -->
    <script type="text/javascript" src="config/constants.js?v=8"></script>
    <script type="text/javascript" src="config/items.js?v=9"></script>
    <script type="text/javascript" src="config/tiles.js?v=10"></script>

    <!-- Main game files -->
    <script type="text/javascript" src="miscfunctions.js?v=11"></script>
    <script type="text/javascript" src="preload.js?v=11"></script>
    <script type="text/javascript" src="gamepad.js?v=8"></script>
    <script type="text/javascript" src="sketch.js?v=10"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            padding: 0;
            margin: 0;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        

        
        #game-container {
            position: relative;
            /* transform: scale(1.5); - Removed: causes mouse coordinate mismatch */
            /* transform-origin: center center; */
        }
        
    
    </style>
    <link rel="stylesheet" href="styles.css?v=2">

 
</head>
  <body>
    <div id="game-container"></div>
    
    <!-- Mobile Controls Overlay -->
    <div id="mobile-controls">
      <!-- Top Left Menu Buttons -->
      <div id="mobile-menu-buttons">
        <button id="btn-mobile-pause" class="mobile-menu-btn">⏸</button>
        <button id="btn-mobile-quests" class="mobile-menu-btn">📋</button>
      </div>
      
      <!-- D-Pad -->
      <div id="dpad">
        <button id="dpad-up" class="dpad-btn">▲</button>
        <button id="dpad-left" class="dpad-btn">◀</button>
        <button id="dpad-right" class="dpad-btn">▶</button>
        <button id="dpad-down" class="dpad-btn">▼</button>
      </div>
      
      <!-- Action Buttons -->
      <div id="action-buttons">
        <button id="btn-interact" class="action-btn">E</button>
        <button id="btn-eat" class="action-btn">Q</button>
      </div>
      
      <!-- Hotbar Controls -->
      <div id="hotbar-controls">
        <button id="hotbar-prev" class="hotbar-btn">←</button>
        <button id="hotbar-next" class="hotbar-btn">→</button>
      </div>
    </div>
    
    <!-- Mobile Inventory UI Overlay -->
    <div id="mobile-inventory-overlay" style="display: none;">
      <div id="mobile-inventory-panel">
        <div id="mobile-inv-header">
          <span id="mobile-inv-title">Inventory</span>
          <button id="mobile-inv-close">×</button>
        </div>
        <div id="mobile-inv-instructions">Tap an item to select, tap destination to move</div>
        <div id="mobile-inv-container-section">
          <div id="mobile-inv-container-label">Container</div>
          <div id="mobile-inv-container-grid"></div>
        </div>
        <div id="mobile-inv-player-section">
          <div id="mobile-inv-player-label">Your Inventory</div>
          <div id="mobile-inv-player-grid"></div>
        </div>
        <div id="mobile-inv-actions">
          <button id="mobile-inv-transfer-all" class="mobile-inv-action-btn">Transfer All →</button>
          <button id="mobile-inv-split" class="mobile-inv-action-btn">Split Stack</button>
        </div>
        <div id="mobile-inv-selected-info"></div>
      </div>
    </div>
    
    <div id="travelOverlay">
      <div class="travel-cloud travel-cloud-1"></div>
      <div class="travel-cloud travel-cloud-2"></div>
      <div class="travel-cloud travel-cloud-3"></div>
      <div class="travel-cloud travel-cloud-4"></div>
      <div class="travel-cloud travel-cloud-5"></div>
      <div class="travel-cloud travel-cloud-6"></div>
      <div class="travel-cloud travel-cloud-7"></div>
      <div class="travel-cloud travel-cloud-8"></div>
      <div class="travel-cloud travel-cloud-9"></div>
      <img src="images/tiles/air_ship.gif" alt="Airship" class="travel-airship">
      <div class="travel-destination">Traveling to...</div>
    </div>
    <div id="menuOverlay"></div>
  </body>
</html>
